name: Auto-import WC2026 results

on:
  schedule:
    # Every 30 minutes. GitHub may delay scheduled runs under load.
    - cron: "*/30 * * * *"
  workflow_dispatch:        # lets you run it manually from the Actions tab
    inputs:
      dry_run:
        description: "Dry run (don't write to Firebase)"
        type: boolean
        default: false

jobs:
  import-results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Import finished results
        env:
          # Optional override; the script defaults to the public DB URL.
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: node scripts/scrape-results.mjs
